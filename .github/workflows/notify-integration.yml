name: Notify integration

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch to dotw-integration
        env:
          GH_TOKEN: ${{ secrets.DOTW_INTEGRATION_TOKEN }}
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            https://api.github.com/repos/tmilkotev/dotw-integration/dispatches \
            -d '{"event_type":"submodule-main-updated"}'